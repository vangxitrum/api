  /playlists/{id}/items/:
    put:
      consumes:
        - application/json
      description: |-
        Change the position of a media in a playlist for the authenticated user.

        **Examples:**
        1. **Move to top:**
        ```json
        {
        "current_id": "123e4567-e89b-12d3-a456-426614174000",
        "next_id": "first-item-id",
        }
        ```

        2. **Move to bottom:**
        ```json
        {
        "current_id": "123e4567-e89b-12d3-a456-426614174000",
        "previous_id": "last-item-id"
        }
        ```
        3. **Move between two items:**
        ```json
        {
        "current_id": "123e4567-e89b-12d3-a456-426614174000",
        "next_id": "item-after-id",
        "previous_id": "item-before-id"
        }
        ```
        > **Note:** The `current_id` is always required. Use `next_id` and `previous_id` to specify the new position.

        > **Important:** If the specified position is invalid (e.g., wrong position of `next_id` or `previous_id`),
        > the operation will fail and return an error. The playlist will remain unchanged in such cases.
      parameters:
        - description: Playlist ID
          format: uuid
          in: path
          name: id
          required: true
          type: string
        - description: Move media details
          in: body
          name: payload
          required: true
          schema:
            $ref: '#/definitions/MoveMediaInPlaylistRequest'
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/ResponseSuccess'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ResponseError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ResponseError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/ResponseError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/ResponseError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ResponseError'
      security:
        - BasicAuth: [ ]
        - Bearer: [ ]
      summary: Move a media within a playlist
      tags:
        - playlist
